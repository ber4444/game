name: Android Instrumentation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  instrumented-tests:
    name: Instrumented Tests (API ${{ matrix.api-level }}, Device ${{ matrix.profile }} / ${{ matrix.target }})
    runs-on: macos-13

    strategy:
      matrix:
        include:
          - api-level: 35
            profile: "Pixel 9"
            target: default

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Set up JDK
        uses: actions/setup-java@v5.0.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Show testing environment
        run: |
          echo "Running on API level: ${{ matrix.api-level }}"
          echo "Running on device: ${{ matrix.profile }}"

      - name: Build debug APK and test APK
        run: ./gradlew assembleDebug assembleAndroidTest

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2.34.0
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          profile: ${{ matrix.profile }}
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload test results
        uses: actions/upload-artifact@v4.6.2
        with:
          name: test-results-api-${{ matrix.api-level }}-device-${{ matrix.name }}
          path: app/build/reports/androidTests/connected/debug/index.html